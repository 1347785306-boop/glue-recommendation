    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        
        .gradient-bg { 
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%); 
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .chat-message {
            animation: slideUp 0.3s ease-out;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.2);
        }
        
        .price-tag {
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
        }
        
        .cost-tag {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }
        
        .feature-pill {
            transition: all 0.2s;
        }
        
        .feature-pill:hover {
            transform: scale(1.05);
        }
        
        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .typing-dot {
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
        
        .spec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 0.5rem;
        }
        
        .scroll-hidden::-webkit-scrollbar { display: none; }
        .scroll-hidden { -ms-overflow-style: none; scrollbar-width: none; }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

                materials: ["PVC", "ABS", "木材"],
                features: ["家具专用", "耐温性好", "封边效果佳"]
            }
        ];

        let products = [...defaultProducts];
        let currentRecommendations = [];

        // 从飞书加载数据
        async function loadFromFeishu() {
            const statusDiv = document.getElementById('dataStatus');
            statusDiv.classList.remove('hidden');
            
            try {
                // 获取access_token
                const tokenRes = await fetch('https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        app_id: FEISHU_CONFIG.appId,
                        app_secret: FEISHU_CONFIG.appSecret
                    })
                });
                const tokenData = await tokenRes.json();
                
                if (tokenData.code !== 0) {
                    throw new Error('获取token失败: ' + tokenData.msg);
                }
                
                const token = tokenData.tenant_access_token;
                
                // 获取产品数据
                const recordsRes = await fetch(
                    `https://open.feishu.cn/open-apis/bitable/v1/apps/${FEISHU_CONFIG.baseId}/tables/${FEISHU_CONFIG.tableId}/records?page_size=500`,
                    {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    }
                );
                const recordsData = await recordsRes.json();
                
                if (recordsData.code !== 0) {
                    throw new Error('获取数据失败: ' + recordsData.msg);
                }
                
                // 解析飞书数据
                const feishuProducts = recordsData.data.items.map(item => parseFeishuRecord(item));
                
                if (feishuProducts.length > 0) {
                    products = feishuProducts;
                    addMessage('✅ 已成功从飞书同步 ' + products.length + ' 条产品数据', false);
                }
                
            } catch (error) {
                console.error('飞书数据加载失败:', error);
                addMessage('⚠️ 飞书数据加载失败，使用本地缓存数据。错误: ' + error.message, false);
            } finally {
                statusDiv.classList.add('hidden');
            }
        }

        // 解析飞书记录
        function parseFeishuRecord(item) {
            const fields = item.fields;
            return {
                id: fields['产品型号'] || item.id,
                name: fields['产品名称'] || '',
                model: fields['产品型号'] || '',
                category: parseArrayField(fields['应用分类']),
                color: fields['产品颜色'] || '',
                businessPrice: parseFloat(fields['业务权限价']) || 0,
                salePrice: parseFloat(fields['建议销售价']) || 0,
                softeningPoint: fields['软化点'] || '',
                viscosity: fields['粘度值'] || '',
                curingTime: fields['固化时间'] || '',
                tempRange: fields['使用温度'] || '',
                heatResistance: fields['耐温范围'] || '',
                packaging: fields['包装规格'] || '',
                moq: parseInt(fields['起订量']) || 0,
                leadTime: fields['生产周期'] || '',
                supplier: fields['供应商'] || '',
                coreSellingPoint: fields['核心卖点'] || '',
                materials: parseArrayField(fields['适用基材']),
                features: parseArrayField(fields['产品特性'])
            };
        }

        // 解析数组字段
        function parseArrayField(value) {
            if (!value) return [];
            if (Array.isArray(value)) return value;
            if (typeof value === 'string') return value.split(/[,，]/).map(s => s.trim());
            return [];
        }

        // 刷新数据
        function refreshData() {
            loadFromFeishu();
        }

        // 页面加载时尝试从飞书加载
        window.addEventListener('load', () => {
            // 可选：自动加载飞书数据
            // loadFromFeishu();
        });

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function sendQuick(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, true);
            input.value = '';

            showTyping();
            setTimeout(() => {
                hideTyping();
                processRequest(text);
            }, 800);
        }

        function addMessage(text, isUser) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'chat-message';
            
            if (isUser) {
                div.innerHTML = `
                    <div class="flex items-start space-x-3 justify-end">
                        <div class="bg-indigo-600 text-white rounded-2xl rounded-tr-sm px-4 py-3 shadow-sm max-w-lg">
                            <p class="text-sm">${text}</p>
                        </div>
                        <div class="w-8 h-8 bg-slate-200 rounded-full flex items-center justify-center flex-shrink-0">
                            <i class="fas fa-user text-slate-500 text-xs"></i>
                        </div>
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="flex items-start space-x-3">
                        <div class="w-8 h-8 gradient-bg rounded-full flex items-center justify-center flex-shrink-0">
                            <i class="fas fa-robot text-white text-xs"></i>
                        </div>
                        <div class="bg-white rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm max-w-lg border border-slate-100">
                            ${text}
                        </div>
                    </div>
                `;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.id = 'typingIndicator';
            div.className = 'chat-message';
            div.innerHTML = `
                <div class="flex items-start space-x-3">
                    <div class="w-8 h-8 gradient-bg rounded-full flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-robot text-white text-xs"></i>
                    </div>
                    <div class="bg-white rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
                        <div class="flex space-x-1">
                            <div class="typing-dot w-2 h-2 bg-slate-400 rounded-full"></div>
                            <div class="typing-dot w-2 h-2 bg-slate-400 rounded-full"></div>
                            <div class="typing-dot w-2 h-2 bg-slate-400 rounded-full"></div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function processRequest(text) {
            const req = parseRequirements(text);
            updateAnalysis(req);
            
            const matches = findMatches(req);
            currentRecommendations = matches;
            
            if (matches.length > 0) {
                showRecommendations(matches);
                const response = `为您找到 <strong>${matches.length}</strong> 款匹配产品，最推荐 <strong>${matches[0].product.model}</strong>，匹配度 ${matches[0].score}%。`;
                addMessage(response, false);
            } else {
                addMessage('抱歉，未找到完全匹配的产品。建议您放宽一些条件，或联系我们的技术顾问获取定制方案。', false);
                document.getElementById('recommendationsPanel').classList.add('hidden');
            }
        }

        function parseRequirements(text) {
            const lower = text.toLowerCase();
            const req = { keywords: [], application: null, materials: [], temperature: null, color: null, features: [] };

            const apps = {
                '汽车': '汽车内饰', '包装': '包装', '电子': '电子', '家具': '家具',
                '书本': '书本装订', '工艺': '工艺品', '过滤': '过滤器', 'LED': 'LED'
            };
            for (const [k, v] of Object.entries(apps)) {
                if (lower.includes(k)) { req.application = v; req.keywords.push(k); }
            }

            const mats = { 'PP': 'PP', 'PE': 'PE', 'ABS': 'ABS', 'PC': 'PC', '金属': '金属', '纸': '纸', '木': '木材' };
            for (const [k, v] of Object.entries(mats)) {
                if (lower.includes(k)) { req.materials.push(v); req.keywords.push(k); }
            }

            if (lower.includes('高温') || lower.includes('150') || lower.includes('100')) {
                req.temperature = 'high'; req.keywords.push('耐高温');
            }

            const colors = ['白色', '黄色', '黑色', '透明'];
            for (const c of colors) {
                if (lower.includes(c)) { req.color = c; req.keywords.push(c); }
            }

            if (lower.includes('快干') || lower.includes('快速')) { req.features.push('快干'); req.keywords.push('快干'); }
            if (lower.includes('绝缘')) { req.features.push('绝缘'); req.keywords.push('绝缘'); }

            return req;
        }

        function updateAnalysis(req) {
            const panel = document.getElementById('analysisPanel');
            
            if (req.keywords.length === 0) {
                panel.innerHTML = `
                    <div class="text-center text-slate-400 py-8">
                        <i class="fas fa-search text-3xl mb-2 opacity-50"></i>
                        <p class="text-xs">等待输入...</p>
                    </div>
                `;
                return;
            }

            let html = '<div class="space-y-2">';
            
            html += `
                <div>
                    <div class="text-xs text-slate-400 mb-1">识别关键词</div>
                    <div class="flex flex-wrap gap-1">
                        ${req.keywords.map(k => `<span class="px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded text-xs">${k}</span>`).join('')}
                    </div>
                </div>
            `;

            if (req.application) {
                html += `
                    <div class="flex items-center p-2 bg-blue-50 rounded-lg">
                        <i class="fas fa-industry text-blue-500 mr-2 text-xs"></i>
                        <div>
                            <div class="text-xs text-blue-600">应用场景</div>
                            <div class="text-sm font-medium text-blue-800">${req.application}</div>
                        </div>
                    </div>
                `;
            }

            if (req.materials.length > 0) {
                html += `
                    <div class="flex items-center p-2 bg-green-50 rounded-lg">
                        <i class="fas fa-cubes text-green-500 mr-2 text-xs"></i>
                        <div>
                            <div class="text-xs text-green-600">适用材料</div>
                            <div class="text-sm font-medium text-green-800">${req.materials.join(', ')}</div>
                        </div>
                    </div>
                `;
            }

            html += '</div>';
            panel.innerHTML = html;
        }

        function findMatches(req) {
            return products.map(p => {
                let score = 0;
                const reasons = [];

                if (req.application && p.category.some(c => c.includes(req.application))) {
                    score += 40; reasons.push('应用场景匹配');
                }

                if (req.materials.length > 0) {
                    const match = req.materials.filter(m => p.materials.some(pm => pm.includes(m)));
                    if (match.length > 0) { score += 25; reasons.push(`适用${match[0]}材料`); }
                }

                if (req.temperature === 'high') {
                    const heat = parseInt(p.heatResistance);
                    if (heat >= 100) { score += 20; reasons.push('耐高温'); }
                }

                if (req.color && p.color.includes(req.color)) {
                    score += 10; reasons.push(`颜色：${p.color}`);
                }

                req.features.forEach(f => {
                    if (p.features.includes(f)) { score += 10; reasons.push(`${f}特性`); }
                });

                if (score === 0 && req.keywords.some(k => 
                    p.name.includes(k) || p.coreSellingPoint.includes(k))) {
                    score = 15; reasons.push('关键词相关');
                }

                return { product: p, score, reasons };
            }).filter(m => m.score > 0).sort((a, b) => b.score - a.score).slice(0, 5);
        }

        function showRecommendations(matches) {
            document.getElementById('recommendationsPanel').classList.remove('hidden');
            document.getElementById('matchCount').textContent = `共 ${matches.length} 款`;
            
            const list = document.getElementById('recommendationsList');
            list.innerHTML = matches.map((m, i) => {
                const badge = i === 0 ? '<span class="bg-amber-400 text-white text-xs px-2 py-0.5 rounded-full font-medium">最佳</span>' : '';
                const scoreClass = m.score >= 80 ? 'bg-emerald-500' : m.score >= 60 ? 'bg-amber-500' : 'bg-slate-400';
                const profit = (m.product.salePrice - m.product.businessPrice).toFixed(2);
                
                return `
                    <div class="product-card bg-white rounded-xl p-4 border border-slate-100 cursor-pointer ${i === 0 ? 'ring-2 ring-indigo-500' : ''}" onclick="showDetail('${m.product.id}')">
                        <div class="flex items-start justify-between mb-2">
                            <div class="flex items-center space-x-3">
                                <div class="w-12 h-12 bg-gradient-to-br from-indigo-100 to-purple-100 rounded-lg flex items-center justify-center">
                                    <span class="text-lg font-bold text-indigo-600">${m.product.model.split('-')[1]}</span>
                                </div>
                                <div>
                                    <div class="flex items-center space-x-2">
                                        <span class="font-semibold text-slate-800">${m.product.model}</span>
                                        ${badge}
                                    </div>
                                    <p class="text-xs text-slate-500">${m.product.name}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="price-tag text-white text-sm font-bold px-3 py-1 rounded-lg">
                                    ¥${m.product.salePrice}
                                </div>
                                <div class="text-xs text-slate-400 mt-1">权限价 ¥${m.product.businessPrice}</div>
                            </div>
                        </div>
                        <div class="flex items-center justify-between mb-2">
                            <div class="${scoreClass} text-white text-xs px-2 py-1 rounded-full font-medium">
                                匹配度 ${m.score}%
                            </div>
                            <div class="text-xs text-green-600 font-medium">
                                利润 ¥${profit}
                            </div>
                        </div>
                        
                        <p class="text-sm text-slate-600 mb-3 line-clamp-2">${m.product.coreSellingPoint}</p>
                        
                        <div class="spec-grid mb-3">
                            <div class="bg-slate-50 rounded p-2 text-center">
                                <div class="text-xs text-slate-400">使用温度</div>
                                <div class="text-xs font-medium text-slate-700">${m.product.tempRange}</div>
                            </div>
                            <div class="bg-slate-50 rounded p-2 text-center">
                                <div class="text-xs text-slate-400">固化时间</div>
                                <div class="text-xs font-medium text-slate-700">${m.product.curingTime}</div>
                            </div>
                            <div class="bg-slate-50 rounded p-2 text-center">
                                <div class="text-xs text-slate-400">颜色</div>
                                <div class="text-xs font-medium text-slate-700">${m.product.color}</div>
                            </div>
                        </div>
                        
                        <div class="flex flex-wrap gap-1">
                            ${m.reasons.slice(0, 3).map(r => `<span class="feature-pill px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded text-xs">${r}</span>`).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showDetail(productId) {
            const p = products.find(x => x.id === productId);
            if (!p) return;

            const modal = document.getElementById('productModal');
            const content = document.getElementById('modalContent');
            const profit = (p.salePrice - p.businessPrice).toFixed(2);

            content.innerHTML = `
                <div class="relative">
                    <button onclick="closeModal()" class="absolute top-4 right-4 w-8 h-8 bg-slate-100 hover:bg-slate-200 rounded-full flex items-center justify-center transition z-10">

                    </button>
                    
                    <div class="p-6">
                        <div class="flex items-center space-x-4 mb-6">
                            <div class="w-16 h-16 bg-gradient-to-br from-indigo-100 to-purple-100 rounded-xl flex items-center justify-center">
                                <span class="text-2xl font-bold text-indigo-600">${p.model.split('-')[1]}</span>
                            </div>
                            <div class="flex-1">
                                <h2 class="text-xl font-bold text-slate-800">${p.model}</h2>

                                <div class="flex items-center space-x-2 mt-1">
                                    <span class="px-2 py-0.5 bg-slate-100 text-slate-600 rounded text-xs">${p.color}</span>
                                    <span class="px-2 py-0.5 bg-slate-100 text-slate-600 rounded text-xs">${p.supplier}</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="price-tag text-white text-2xl font-bold px-4 py-2 rounded-lg">
                                    ¥${p.salePrice}
                                </div>
                                <div class="text-sm text-slate-500 mt-1">业务权限价 <span class="cost-tag text-white px-2 py-0.5 rounded text-xs">¥${p.businessPrice}</span></div>
                                <div class="text-sm text-green-600 font-medium mt-1">利润空间 ¥${profit}</div>
                            </div>
                        </div>
                        
                        <div class="bg-slate-50 rounded-xl p-4 mb-6">
                            <p class="text-slate-700 text-sm">${p.coreSellingPoint}</p>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="p-3 bg-slate-50 rounded-lg">
                                <div class="text-xs text-slate-400 mb-1">使用温度</div>
                                <div class="font-medium text-slate-800">${p.tempRange}</div>
                            </div>
                            <div class="p-3 bg-slate-50 rounded-lg">
                                <div class="text-xs text-slate-400 mb-1">软化点</div>
                                <div class="font-medium text-slate-800">${p.softeningPoint || '-'}</div>
                            </div>
                            <div class="p-3 bg-slate-50 rounded-lg">
                                <div class="text-xs text-slate-400 mb-1">粘度值</div>
                                <div class="font-medium text-slate-800">${p.viscosity} mPa.s</div>
                            </div>
                            <div class="p-3 bg-slate-50 rounded-lg">
                                <div class="text-xs text-slate-400 mb-1">固化时间</div>
                                <div class="font-medium text-slate-800">${p.curingTime}</div>
                            </div>
                            <div class="p-3 bg-slate-50 rounded-lg">
                                <div class="text-xs text-slate-400 mb-1">耐温范围</div>
                                <div class="font-medium text-slate-800">${p.heatResistance}</div>
                            </div>
                            <div class="p-3 bg-slate-50 rounded-lg">
                                <div class="text-xs text-slate-400 mb-1">包装规格</div>
                                <div class="font-medium text-slate-800 text-sm">${p.packaging}</div>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <div class="text-xs text-slate-400 mb-2">应用分类</div>
                            <div class="flex flex-wrap gap-2">
                                ${p.category.map(c => `<span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-sm">${c}</span>`).join('')}
                            </div>
                        </div>
                        
                        <div class="mb-6">
                            <div class="text-xs text-slate-400 mb-2">适用材料</div>
                            <div class="flex flex-wrap gap-2">
                                ${p.materials.map(m => `<span class="px-3 py-1 bg-green-50 text-green-600 rounded-lg text-sm">${m}</span>`).join('')}
                            </div>
                        </div>
                        
                        <div class="flex space-x-3">
                            <button onclick="closeModal()" class="flex-1 py-3 border border-slate-200 rounded-xl text-slate-600 hover:bg-slate-50 transition">
                                关闭
                            </button>
                            <button onclick="selectProduct('${p.id}')" class="flex-1 py-3 gradient-bg text-white rounded-xl hover:opacity-90 transition">
                                选择此产品

                        </div>
                    </div>

            `;

            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('productModal').classList.add('hidden');
        }

        function selectProduct(id) {
            const p = products.find(x => x.id === id);
            closeModal();
            addMessage(`✓ 已选择 <strong>${p.model}</strong>，可为客户提供详细技术方案和样品支持。`, false);
        }

        function resetConversation() {
            document.getElementById('chatContainer').innerHTML = `
                <div class="chat-message">
                    <div class="flex items-start space-x-3">
                        <div class="w-8 h-8 gradient-bg rounded-full flex items-center justify-center flex-shrink-0">
                            <i class="fas fa-robot text-white text-sm"></i>
                        </div>
                        <div class="bg-white rounded-2xl rounded-tl-sm p-4 shadow-sm max-w-lg border border-slate-100">
                            <p class="text-slate-700 text-sm leading-relaxed">您好！我是热熔胶产品推荐助手。</p>
                            <p class="text-slate-500 text-sm mt-2">请描述您的应用需求，我将为您推荐最合适的产品。</p>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('analysisPanel').innerHTML = `
                <div class="text-center text-slate-400 py-8">
                    <i class="fas fa-search text-3xl mb-2 opacity-50"></i>
                    <p class="text-xs">等待输入...</p>
                </div>
            `;
            document.getElementById('recommendationsPanel').classList.add('hidden');
            currentRecommendations = [];
        }

        document.getElementById('productModal').addEventListener('click', (e) => {
            if (e.target.id === 'productModal') closeModal();
        });
    </script>
